<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 120">

  <!-- ── MAIN GNARLED STEM ──────────────────────────────────────────────
       Thick, dark, old wood — not a graceful curve. Has weight. -->
  <path d="M25,120 C30,106 18,92 22,72 C26,54 19,38 24,16 C26,7 22,2 21,0"
    stroke="#14240a" stroke-width="3.8" fill="none" stroke-linecap="round"/>

  <!-- ── COMPANION VINE (twines alongside, thinner) ─────────────────── -->
  <path d="M22,120 C20,108 28,95 26,78 C24,62 27,46 22,26 C21,16 24,6 23,0"
    stroke="#1a2e0e" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ── VINE KNOT / NODE ────────────────────────────────────────────────
       Real vines swell at the node. This is where the bend is hardest. -->
  <ellipse cx="22" cy="72" rx="4" ry="2.2" fill="#0e1c08" opacity="0.45"/>

  <!-- ── LICHEN PATCHES ──────────────────────────────────────────────────
       Lichen grows slowly and irregularly — not round dots, never uniform. -->
  <ellipse cx="21" cy="22" rx="4.5" ry="2"   fill="#565e30" opacity="0.55" transform="rotate(-18,21,22)"/>
  <ellipse cx="25" cy="96" rx="3.2" ry="1.6" fill="#606438" opacity="0.50" transform="rotate(12,25,96)"/>
  <circle  cx="27" cy="52" r="1.8"            fill="#565e30" opacity="0.45"/>
  <circle  cx="20" cy="61" r="1.1"            fill="#626438" opacity="0.40"/>
  <ellipse cx="23" cy="108" rx="2" ry="1.2"  fill="#585c30" opacity="0.40" transform="rotate(8,23,108)"/>

  <!-- ── HANGING LEAF 1 — drapes right-downward from the vine ──────────
       Leaves hang DOWN because of gravity. Not fans, not diamonds.
       Widest at mid-height, asymmetric: right side fuller, left concave. -->
  <g transform="translate(24,74)">
    <path d="M0,0 C6,3 13,10 14,21 C15,31 11,39 5,40 C0,41 -4,34 -2,22 C-1,12 -1,4 0,0Z"
      fill="#1a2e0e"/>
    <!-- Midrib follows the droop, not centered -->
    <line x1="0" y1="2"  x2="7"  y2="34" stroke="#b0a070" stroke-width="0.8"/>
    <line x1="1" y1="9"  x2="10" y2="7"  stroke="#b0a070" stroke-width="0.48" opacity="0.7"/>
    <line x1="3" y1="18" x2="13" y2="18" stroke="#b0a070" stroke-width="0.48" opacity="0.7"/>
    <line x1="5" y1="28" x2="13" y2="31" stroke="#b0a070" stroke-width="0.42" opacity="0.6"/>
  </g>

  <!-- ── HANGING LEAF 2 — drapes left-downward ─────────────────────── -->
  <g transform="translate(24,40)">
    <path d="M0,0 C-5,3 -12,10 -13,20 C-14,28 -10,34 -4,32 C0,30 2,20 2,11 C2,4 0,2 0,0Z"
      fill="#162808"/>
    <line x1="0"  y1="2"  x2="-6"  y2="27" stroke="#b0a070" stroke-width="0.76"/>
    <line x1="-1" y1="10" x2="-11" y2="8"  stroke="#b0a070" stroke-width="0.46" opacity="0.7"/>
    <line x1="-3" y1="19" x2="-12" y2="19" stroke="#b0a070" stroke-width="0.46" opacity="0.68"/>
  </g>

  <!-- ── HANGING MOSS STRANDS ────────────────────────────────────────────
       Thin filaments draping from the node — Spanish moss / hanging lichen. -->
  <path d="M22,72 C21,80 23,88 21,96"  stroke="#364020" stroke-width="0.7"  fill="none" opacity="0.62"/>
  <path d="M20,74 C18,83 20,91 18,99"  stroke="#364020" stroke-width="0.55" fill="none" opacity="0.50"/>
  <path d="M23,16 C24,24 21,31 23,38"  stroke="#364020" stroke-width="0.60" fill="none" opacity="0.52"/>
  <path d="M25,18 C27,26 25,34 27,40"  stroke="#364020" stroke-width="0.50" fill="none" opacity="0.42"/>

  <!-- ── SEARCHING TENDRIL ──────────────────────────────────────────── -->
  <path d="M22,68 C33,62 36,52 31,46 C26,40 21,44 24,49 C26,53 31,50 29,46"
    stroke="#14240a" stroke-width="1.05" fill="none" stroke-linecap="round"/>

</svg>
