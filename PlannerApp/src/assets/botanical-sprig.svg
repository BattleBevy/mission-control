<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 240">
  <!-- Vine stem curving up from bottom -->
  <path d="M90,235 C85,205 78,175 68,145 C58,115 52,80 55,45"
    stroke="#4e6b35" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Leaf 1 — large, lower left, -45° -->
  <g transform="translate(48,210) rotate(-45)" fill="#4e6b35">
    <path d="M0,-20 C13,-10 13,10 0,20 C-13,10 -13,-10 0,-20Z"/>
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#faf5eb" stroke-width="0.9"/>
    <line x1="0" y1="-6" x2="-8" y2="-12" stroke="#faf5eb" stroke-width="0.6"/>
    <line x1="0" y1="-6" x2="8" y2="-12" stroke="#faf5eb" stroke-width="0.6"/>
  </g>

  <!-- Leaf 2 — medium, right side, +30° -->
  <g transform="translate(88,175) rotate(30)" fill="#4e6b35">
    <path d="M0,-15 C10,-7 10,7 0,15 C-10,7 -10,-7 0,-15Z"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#faf5eb" stroke-width="0.8"/>
  </g>

  <!-- Leaf 3 — medium, left side, -60° -->
  <g transform="translate(46,140) rotate(-60)" fill="#4e6b35">
    <path d="M0,-13 C9,-6 9,6 0,13 C-9,6 -9,-6 0,-13Z"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#faf5eb" stroke-width="0.7"/>
  </g>

  <!-- Leaf 4 — small, upper right, +20° -->
  <g transform="translate(75,95) rotate(20)" fill="#4e6b35">
    <path d="M0,-10 C7,-5 7,5 0,10 C-7,5 -7,-5 0,-10Z"/>
  </g>

  <!-- Leaf 5 — small, upper left, -30° -->
  <g transform="translate(57,55) rotate(-30)" fill="#4e6b35">
    <path d="M0,-8 C5,-4 5,4 0,8 C-5,4 -5,-4 0,-8Z"/>
  </g>

  <!-- Berry cluster at stem tip — olive-brown for colour contrast -->
  <circle cx="63" cy="30" r="3.5" fill="#7a5c3c"/>
  <circle cx="55" cy="22" r="2.5" fill="#7a5c3c"/>
  <circle cx="70" cy="20" r="2" fill="#7a5c3c"/>
</svg>
