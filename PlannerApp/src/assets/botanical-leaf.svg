<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 72">

  <!-- ── GNARLED TWIG — grows from bottom, bends with age ───────────── -->
  <path d="M30,72 C28,62 32,52 28,38 C24,26 28,14 26,4"
    stroke="#14240a" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Companion thin twig branching right at ~y=38 -->
  <path d="M28,38 C36,32 46,28 52,26"
    stroke="#1a2e0e" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- ── KNOT at the bend ────────────────────────────────────────────── -->
  <ellipse cx="28" cy="38" rx="3.5" ry="1.8" fill="#0e1c08" opacity="0.4"/>

  <!-- ── HANGING FROND — drapes left from twig at y≈44 ──────────────── -->
  <g transform="translate(27,44)">
    <path d="M0,0 C-4,3 -10,10 -12,20 C-14,28 -10,32 -5,30 C-1,28 2,20 2,10 C2,4 0,2 0,0Z"
      fill="#1a2e0e"/>
    <line x1="0" y1="2" x2="-6" y2="26" stroke="#b0a070" stroke-width="0.75"/>
    <line x1="-1" y1="10" x2="-10" y2="8"  stroke="#b0a070" stroke-width="0.45" opacity="0.7"/>
    <line x1="-3" y1="18" x2="-12" y2="18" stroke="#b0a070" stroke-width="0.45" opacity="0.65"/>
  </g>

  <!-- ── HANGING FROND — drapes right from twig at y≈20 ─────────────── -->
  <g transform="translate(27,20)">
    <path d="M0,0 C5,3 12,10 13,20 C14,28 10,32 5,30 C0,28 -2,20 -2,10 C-2,4 0,2 0,0Z"
      fill="#162808"/>
    <line x1="0" y1="2" x2="6" y2="25" stroke="#b0a070" stroke-width="0.72"/>
    <line x1="1" y1="9" x2="10" y2="7"  stroke="#b0a070" stroke-width="0.44" opacity="0.7"/>
    <line x1="3" y1="18" x2="12" y2="18" stroke="#b0a070" stroke-width="0.44" opacity="0.65"/>
  </g>

  <!-- ── SMALL LEAF off the right branch at ~(48,28) ────────────────── -->
  <g transform="translate(49,28) rotate(20)">
    <path d="M0,0 C3,2 7,7 7,13 C7,18 4,20 1,18 C-2,17 -2,10 -1,5 C-1,2 0,0 0,0Z"
      fill="#1e3412"/>
    <line x1="0" y1="1" x2="3" y2="15" stroke="#b0a070" stroke-width="0.55"/>
  </g>

  <!-- ── MUSHROOM at twig base ───────────────────────────────────────── -->
  <!-- Stem -->
  <path d="M35,72 C35,66 36,62 36,58 L40,58 C40,62 41,66 41,72Z" fill="#c4b484"/>
  <!-- Cap — dark, slightly irregular, no cheerful highlight -->
  <path d="M26,60 C28,52 34,48 38,48 C42,47 47,51 49,58 C50,62 48,66 42,67 L32,67 C28,66 26,63 26,60Z"
    fill="#1e1008"/>
  <!-- Mottled spots — irregular, not uniform -->
  <circle cx="42" cy="52" r="2"   fill="#3a2010" opacity="0.6"/>
  <circle cx="34" cy="50" r="1.4" fill="#3a2010" opacity="0.55"/>
  <circle cx="46" cy="57" r="1.2" fill="#3a2010" opacity="0.5"/>
  <!-- Gills — dark, close together -->
  <path d="M28,61 Q38,67 48,61" stroke="#0e0804" stroke-width="1.2" fill="none"/>
  <!-- Soil / decay at base -->
  <ellipse cx="37" cy="71" rx="6" ry="1.5" fill="#1a1208" opacity="0.35"/>

  <!-- ── LICHEN on twig ──────────────────────────────────────────────── -->
  <ellipse cx="28" cy="56" rx="3.5" ry="1.5" fill="#565e30" opacity="0.5" transform="rotate(-12,28,56)"/>
  <circle  cx="26" cy="12" r="1.5"           fill="#606438" opacity="0.45"/>

  <!-- ── MOSS STRAND hanging from bend ─────────────────────────────── -->
  <path d="M28,38 C27,46 29,52 27,58" stroke="#364020" stroke-width="0.65" fill="none" opacity="0.6"/>
  <path d="M26,40 C24,48 26,55 24,62" stroke="#364020" stroke-width="0.5"  fill="none" opacity="0.48"/>

</svg>
