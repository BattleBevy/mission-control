<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50">
  <g transform="translate(20,25)" fill="#4e6b35">
    <!-- Leaf body — pointed oval, same formula as the sprig leaves -->
    <path d="M0,-20 C13,-10 13,10 0,20 C-13,10 -13,-10 0,-20Z"/>
    <!-- Centre vein -->
    <line x1="0" y1="-16" x2="0" y2="16" stroke="#faf5eb" stroke-width="1.2"/>
    <!-- Upper lateral veins -->
    <line x1="0" y1="-8" x2="-9" y2="-14" stroke="#faf5eb" stroke-width="0.8"/>
    <line x1="0" y1="-8" x2="9" y2="-14" stroke="#faf5eb" stroke-width="0.8"/>
    <!-- Lower lateral veins -->
    <line x1="0" y1="2" x2="-8" y2="-3" stroke="#faf5eb" stroke-width="0.8"/>
    <line x1="0" y1="2" x2="8" y2="-3" stroke="#faf5eb" stroke-width="0.8"/>
  </g>
</svg>
