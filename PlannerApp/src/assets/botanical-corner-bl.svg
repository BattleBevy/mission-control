<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">

  <!-- ═══ BACK LEAVES (render first — behind everything else) ═══ -->

  <!-- Back leaf: large, lower-left area, draped downward -->
  <g transform="translate(14,262) rotate(65)" fill="#2d4e1a" opacity="0.85">
    <path d="M0,-30 C16,-18 22,-2 20,14 C18,28 10,36 0,38 C-10,36 -18,28 -20,14 C-22,-2 -16,-18 0,-30Z"/>
    <line x1="0" y1="-26" x2="0" y2="34" stroke="#c8b89a" stroke-width="0.85"/>
    <line x1="0" y1="-14" x2="-14" y2="-22" stroke="#c8b89a" stroke-width="0.6"/>
    <line x1="0" y1="-14" x2="14" y2="-22" stroke="#c8b89a" stroke-width="0.6"/>
    <line x1="0" y1="6" x2="-13" y2="-1" stroke="#c8b89a" stroke-width="0.6"/>
    <line x1="0" y1="6" x2="13" y2="-1" stroke="#c8b89a" stroke-width="0.6"/>
    <line x1="0" y1="22" x2="-9" y2="16" stroke="#c8b89a" stroke-width="0.5"/>
    <line x1="0" y1="22" x2="9" y2="16" stroke="#c8b89a" stroke-width="0.5"/>
  </g>

  <!-- Back leaf: medium, upper-right zone -->
  <g transform="translate(158,62) rotate(22)" fill="#3a6020" opacity="0.8">
    <path d="M0,-22 C13,-11 17,1 15,14 C13,24 6,28 0,30 C-6,28 -13,24 -15,14 C-17,1 -13,-11 0,-22Z"/>
    <line x1="0" y1="-18" x2="0" y2="26" stroke="#c8b89a" stroke-width="0.75"/>
    <line x1="0" y1="-7" x2="-11" y2="-14" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="-7" x2="11" y2="-14" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="8" x2="-10" y2="2" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="8" x2="10" y2="2" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- ═══ MAIN VINE + BRANCHES ═══ -->

  <!-- Main vine: thick, gnarled, from bottom-left climbing up-right -->
  <path d="M6,350 C8,322 14,296 16,268 C18,240 14,214 20,188 C26,162 22,138 30,114 C36,94 44,76 50,52 C56,32 60,16 66,0"
    stroke="#1e3a14" stroke-width="7.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Side branch angling lower-left (goes off left edge — clipped naturally) -->
  <path d="M18,192 C10,180 4,166 0,150 C-4,136 2,122 8,118"
    stroke="#253d17" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Side branch sweeping right across the composition -->
  <path d="M34,116 C58,104 82,92 108,78 C130,66 154,56 180,46"
    stroke="#253d17" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Continuation of right branch -->
  <path d="M180,46 C206,36 232,26 262,16 C278,10 292,4 300,0"
    stroke="#2a4818" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Thin branch from upper main vine -->
  <path d="M54,48 C62,34 72,22 84,14 C92,8 100,4 106,6"
    stroke="#2d4e1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ═══ MUSHROOM CLUSTER (at the vine base) ═══ -->

  <!-- Mushroom 1: leftmost, short and wide -->
  <!-- Stem -->
  <path d="M20,350 C19,338 20,328 20,320 L28,320 C28,328 29,338 28,350Z" fill="#d4b896"/>
  <!-- Cap dome -->
  <path d="M4,322 C6,308 14,299 24,298 C34,297 42,304 46,316 C48,322 44,328 34,330 L14,330 C8,328 4,326 4,322Z" fill="#7a4828"/>
  <!-- Cap highlight -->
  <ellipse cx="20" cy="308" rx="8" ry="5" fill="#a06838" opacity="0.55"/>
  <!-- Gill line -->
  <path d="M6,323 Q24,331 44,323" stroke="#4e2810" stroke-width="1.2" fill="none"/>

  <!-- Mushroom 2: center-left, tallest -->
  <!-- Stem -->
  <path d="M54,350 C52,332 53,316 54,304 L65,304 C66,316 67,332 65,350Z" fill="#d4b896"/>
  <!-- Cap dome -->
  <path d="M32,308 C34,290 44,278 60,276 C74,274 84,284 88,298 C90,308 86,316 74,318 L44,318 C36,316 32,314 32,308Z" fill="#8b5030"/>
  <!-- Cap highlight -->
  <ellipse cx="56" cy="286" rx="10" ry="7" fill="#b07040" opacity="0.5"/>
  <!-- Spots on cap -->
  <circle cx="68" cy="282" r="2.5" fill="#c88050" opacity="0.4"/>
  <circle cx="46" cy="286" r="1.8" fill="#c88050" opacity="0.35"/>
  <!-- Gill line -->
  <path d="M35,310 Q60,320 86,310" stroke="#5c3018" stroke-width="1.5" fill="none"/>

  <!-- Mushroom 3: rightmost, medium height -->
  <!-- Stem -->
  <path d="M90,350 C89,337 90,326 90,318 L100,318 C100,326 101,337 100,350Z" fill="#c8b28a"/>
  <!-- Cap dome -->
  <path d="M72,320 C74,306 82,297 95,296 C108,295 116,303 118,314 C120,322 116,328 104,330 L82,330 C76,328 72,325 72,320Z" fill="#7a4020"/>
  <!-- Cap highlight -->
  <ellipse cx="90" cy="305" rx="8" ry="5" fill="#a05828" opacity="0.5"/>
  <!-- Gill line -->
  <path d="M74,321 Q95,329 116,321" stroke="#4e2010" stroke-width="1.2" fill="none"/>

  <!-- Moss/soil dots at base -->
  <circle cx="10" cy="346" r="2.2" fill="#3a5a20" opacity="0.55"/>
  <circle cx="24" cy="349" r="1.6" fill="#2d4a18" opacity="0.5"/>
  <circle cx="42" cy="348" r="1.4" fill="#3a5a20" opacity="0.45"/>
  <circle cx="110" cy="347" r="1.8" fill="#3a5a20" opacity="0.4"/>
  <circle cx="120" cy="345" r="1.3" fill="#2d4a18" opacity="0.4"/>

  <!-- ═══ FOREGROUND LEAVES ═══ -->

  <!-- Leaf A: large, off main vine lower section, drooping right-down -->
  <g transform="translate(22,230) rotate(52)" fill="#3a6020">
    <path d="M0,-26 C15,-15 20,-1 18,13 C16,26 8,32 0,34 C-8,32 -16,26 -18,13 C-20,-1 -15,-15 0,-26Z"/>
    <line x1="0" y1="-22" x2="0" y2="30" stroke="#c8b89a" stroke-width="0.9"/>
    <line x1="0" y1="-11" x2="-13" y2="-18" stroke="#c8b89a" stroke-width="0.65"/>
    <line x1="0" y1="-11" x2="13" y2="-18" stroke="#c8b89a" stroke-width="0.65"/>
    <line x1="0" y1="5" x2="-12" y2="-2" stroke="#c8b89a" stroke-width="0.65"/>
    <line x1="0" y1="5" x2="12" y2="-2" stroke="#c8b89a" stroke-width="0.65"/>
    <line x1="0" y1="20" x2="-8" y2="14" stroke="#c8b89a" stroke-width="0.5"/>
    <line x1="0" y1="20" x2="8" y2="14" stroke="#c8b89a" stroke-width="0.5"/>
  </g>

  <!-- Leaf B: large, end of left branch, pointing out-left -->
  <g transform="translate(4,150) rotate(-42)" fill="#2d4e1a">
    <path d="M0,-24 C14,-13 19,0 17,14 C15,26 8,30 0,32 C-8,30 -15,26 -17,14 C-19,0 -14,-13 0,-24Z"/>
    <line x1="0" y1="-20" x2="0" y2="28" stroke="#c8b89a" stroke-width="0.85"/>
    <line x1="0" y1="-9" x2="-13" y2="-16" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="-9" x2="13" y2="-16" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="8" x2="-11" y2="1" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="8" x2="11" y2="1" stroke="#c8b89a" stroke-width="0.62"/>
  </g>

  <!-- Leaf C: medium, off right branch ~(110,78) -->
  <g transform="translate(114,82) rotate(38)" fill="#3a6020">
    <path d="M0,-20 C12,-10 16,1 14,13 C12,22 6,26 0,28 C-6,26 -12,22 -14,13 C-16,1 -12,-10 0,-20Z"/>
    <line x1="0" y1="-16" x2="0" y2="24" stroke="#c8b89a" stroke-width="0.8"/>
    <line x1="0" y1="-7" x2="-10" y2="-13" stroke="#c8b89a" stroke-width="0.58"/>
    <line x1="0" y1="-7" x2="10" y2="-13" stroke="#c8b89a" stroke-width="0.58"/>
    <line x1="0" y1="7" x2="-9" y2="1" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="7" x2="9" y2="1" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- Leaf D: medium, upper right branch ~(196,44) -->
  <g transform="translate(200,46) rotate(15)" fill="#2d4e1a">
    <path d="M0,-18 C11,-9 14,1 12,12 C10,20 5,22 0,24 C-5,22 -10,20 -12,12 C-14,1 -11,-9 0,-18Z"/>
    <line x1="0" y1="-14" x2="0" y2="20" stroke="#c8b89a" stroke-width="0.75"/>
    <line x1="0" y1="-5" x2="-9" y2="-11" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="-5" x2="9" y2="-11" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- Leaf E: small, near upper main vine ~y=30 -->
  <g transform="translate(60,32) rotate(-28)" fill="#4e7030">
    <path d="M0,-14 C8,-7 10,1 9,9 C7,16 3,18 0,18 C-3,18 -7,16 -9,9 C-10,1 -8,-7 0,-14Z"/>
    <line x1="0" y1="-10" x2="0" y2="15" stroke="#c8b89a" stroke-width="0.65"/>
  </g>

  <!-- Leaf F: small, off thin branch ~(90,12) -->
  <g transform="translate(90,14) rotate(32)" fill="#3a6020">
    <path d="M0,-12 C7,-6 9,1 8,8 C6,13 3,15 0,15 C-3,15 -6,13 -8,8 C-9,1 -7,-6 0,-12Z"/>
    <line x1="0" y1="-9" x2="0" y2="12" stroke="#c8b89a" stroke-width="0.6"/>
  </g>

  <!-- ═══ TENDRILS (searching, curling) ═══ -->
  <!-- Tendril at end of left branch -->
  <path d="M8,118 C4,110 10,103 16,106 C20,108 18,115 13,114 C10,113 10,109 13,108"
    stroke="#2a4818" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Tendril off thin upper branch -->
  <path d="M106,6 C114,2 120,7 118,14 C116,19 109,18 108,13"
    stroke="#2d4e1a" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Tendril at far right branch end -->
  <path d="M300,0 C296,8 298,16 292,14 C288,12 290,6 294,8"
    stroke="#2a4818" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- ═══ BERRY CLUSTER (where right branch forks) ═══ -->
  <path d="M136,64 C148,58 156,54 164,50" stroke="#2a4818" stroke-width="1" fill="none"/>
  <circle cx="166" cy="50" r="4" fill="#5c2a1e"/>
  <circle cx="158" cy="46" r="3" fill="#6b3020"/>
  <circle cx="172" cy="44" r="3.2" fill="#5c2a1e"/>
  <circle cx="164" cy="40" r="2.5" fill="#7a3828"/>
  <!-- Berry highlights -->
  <circle cx="165" cy="48" r="1.2" fill="#a05040" opacity="0.5"/>
  <circle cx="157" cy="44" r="0.9" fill="#a05040" opacity="0.45"/>

</svg>
