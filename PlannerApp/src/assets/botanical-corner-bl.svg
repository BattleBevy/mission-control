<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">

  <!-- ═══ BACK LEAVES (behind everything) ═══ -->

  <g transform="translate(14,262) rotate(65)" fill="#1e3610" opacity="0.75">
    <path d="M0,-30 C16,-18 22,-2 20,14 C18,28 10,36 0,38 C-10,36 -18,28 -20,14 C-22,-2 -16,-18 0,-30Z"/>
    <line x1="0" y1="-26" x2="0" y2="34" stroke="#b0a070" stroke-width="0.85"/>
    <line x1="0" y1="-14" x2="-14" y2="-22" stroke="#b0a070" stroke-width="0.6"/>
    <line x1="0" y1="-14" x2="14"  y2="-22" stroke="#b0a070" stroke-width="0.6"/>
    <line x1="0" y1="6"   x2="-13" y2="-1"  stroke="#b0a070" stroke-width="0.6"/>
    <line x1="0" y1="6"   x2="13"  y2="-1"  stroke="#b0a070" stroke-width="0.6"/>
    <line x1="0" y1="22"  x2="-9"  y2="16"  stroke="#b0a070" stroke-width="0.5"/>
    <line x1="0" y1="22"  x2="9"   y2="16"  stroke="#b0a070" stroke-width="0.5"/>
  </g>

  <g transform="translate(158,62) rotate(22)" fill="#243e14" opacity="0.7">
    <path d="M0,-22 C13,-11 17,1 15,14 C13,24 6,28 0,30 C-6,28 -13,24 -15,14 C-17,1 -13,-11 0,-22Z"/>
    <line x1="0" y1="-18" x2="0"   y2="26"  stroke="#b0a070" stroke-width="0.75"/>
    <line x1="0" y1="-7"  x2="-11" y2="-14" stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="-7"  x2="11"  y2="-14" stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="8"   x2="-10" y2="2"   stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="8"   x2="10"  y2="2"   stroke="#b0a070" stroke-width="0.55"/>
  </g>

  <!-- ═══ MAIN VINE + BRANCHES ═══ -->

  <!-- Main vine: old wood — much darker, still thick -->
  <path d="M6,350 C8,322 14,296 16,268 C18,240 14,214 20,188 C26,162 22,138 30,114 C36,94 44,76 50,52 C56,32 60,16 66,0"
    stroke="#0a1c06" stroke-width="7.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Vine knots / nodes — wood swells where it bends -->
  <ellipse cx="16" cy="268" rx="5" ry="3" fill="#060e04" opacity="0.4"/>
  <ellipse cx="20" cy="188" rx="4" ry="2.5" fill="#060e04" opacity="0.35"/>
  <ellipse cx="30" cy="114" rx="4" ry="2.2" fill="#060e04" opacity="0.35"/>

  <!-- Left branch -->
  <path d="M18,192 C10,180 4,166 0,150 C-4,136 2,122 8,118"
    stroke="#122208" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Right branch sweeping across -->
  <path d="M34,116 C58,104 82,92 108,78 C130,66 154,56 180,46"
    stroke="#122208" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Branch continuation -->
  <path d="M180,46 C206,36 232,26 262,16 C278,10 292,4 300,0"
    stroke="#162a0a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Thin upper branch -->
  <path d="M54,48 C62,34 72,22 84,14 C92,8 100,4 106,6"
    stroke="#182c0a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- ═══ SHELF / BRACKET FUNGUS on main vine at ~(18,218) ═══ -->
  <!-- Shelf fungi grow horizontally out of old wood. No stem. Dark cap, pale underside. -->
  <path d="M18,218 C28,212 50,208 68,211 C78,214 80,220 76,225 C72,230 52,232 30,229 C18,226 12,222 18,218Z"
    fill="#1a0e06"/>
  <!-- Pale underside — cream/tan, characteristic of bracket fungi -->
  <path d="M20,221 C32,217 52,215 68,218 C76,221 78,225 74,228"
    stroke="#c8b884" stroke-width="0.7" fill="none" opacity="0.5"/>
  <!-- Concentric growth rings — how you tell a bracket fungus's age -->
  <path d="M26,224 C40,219 58,218 70,221" stroke="#0a0602" stroke-width="0.7" fill="none" opacity="0.5"/>
  <path d="M32,227 C46,223 60,222 72,225" stroke="#0a0602" stroke-width="0.5" fill="none" opacity="0.38"/>

  <!-- Second small shelf fungus, lower on vine at ~(14,300) -->
  <path d="M14,300 C22,295 38,292 52,295 C60,298 62,303 58,307 C54,311 36,312 20,309 C12,306 8,303 14,300Z"
    fill="#160c04"/>
  <path d="M16,303 C26,299 40,297 52,300" stroke="#c4b47a" stroke-width="0.6" fill="none" opacity="0.45"/>

  <!-- ═══ LICHEN PATCHES on vine and ground ═══ -->
  <ellipse cx="10" cy="240" rx="7"   ry="2.5" fill="#4e5428" opacity="0.55" transform="rotate(-8,10,240)"/>
  <ellipse cx="22" cy="160" rx="5.5" ry="2"   fill="#566038" opacity="0.5"  transform="rotate(12,22,160)"/>
  <ellipse cx="48" cy="72"  rx="4"   ry="1.8" fill="#4e5428" opacity="0.45" transform="rotate(-5,48,72)"/>
  <circle  cx="60" cy="40"  r="2.5"            fill="#5c6430" opacity="0.4"/>
  <ellipse cx="8"  cy="340" rx="7"   ry="2.5" fill="#4e5428" opacity="0.55" transform="rotate(-10,8,340)"/>
  <ellipse cx="55" cy="343" rx="5"   ry="2"   fill="#566038" opacity="0.5"  transform="rotate(14,55,343)"/>
  <ellipse cx="128" cy="341" rx="4"  ry="1.8" fill="#4e5428" opacity="0.45" transform="rotate(-4,128,341)"/>

  <!-- ═══ MUSHROOM CLUSTER at the vine base ═══ -->
  <!-- These are dark, old, and not cheerful. They grow where nothing else can. -->

  <!-- Mushroom 1: leftmost, short and wide — near-black cap -->
  <path d="M20,350 C19,338 20,328 20,320 L28,320 C28,328 29,338 28,350Z" fill="#c4b484"/>
  <!-- Cap: near-black-brown, slightly irregular rim -->
  <path d="M3,322 C5,308 13,299 23,298 C33,296 42,303 46,315 C48,322 44,329 33,331 L13,330 C7,328 3,326 3,322Z"
    fill="#1e1008"/>
  <!-- Very muted speckling — no warm orange highlights -->
  <circle cx="32" cy="303" r="2.5" fill="#362010" opacity="0.5"/>
  <circle cx="20" cy="306" r="1.6" fill="#3a2412" opacity="0.45"/>
  <circle cx="38" cy="310" r="1.3" fill="#2e1a0a" opacity="0.4"/>
  <!-- Gills: dark, close-set -->
  <path d="M6,323 Q24,331 44,323" stroke="#0a0602" stroke-width="1.4" fill="none"/>

  <!-- Mushroom 2: tallest, center — very dark, heavily spotted -->
  <path d="M54,350 C52,332 53,316 54,304 L65,304 C66,316 67,332 65,350Z" fill="#c4b484"/>
  <!-- Cap: deepest brown, the oldest one -->
  <path d="M31,308 C33,290 43,278 59,276 C73,274 83,283 87,297 C89,307 85,316 73,318 L43,318 C35,316 31,314 31,308Z"
    fill="#180e06"/>
  <!-- Many spots — irregular spacing, dark on dark, just barely visible -->
  <circle cx="68" cy="282" r="3.2"  fill="#362010" opacity="0.6"/>
  <circle cx="46" cy="285" r="2.2"  fill="#3a2412" opacity="0.55"/>
  <circle cx="76" cy="291" r="1.8"  fill="#2e1a0a" opacity="0.5"/>
  <circle cx="54" cy="280" r="2"    fill="#3e2614" opacity="0.5"/>
  <circle cx="62" cy="295" r="1.4"  fill="#362010" opacity="0.45"/>
  <circle cx="40" cy="292" r="1.6"  fill="#301808" opacity="0.4"/>
  <!-- Gills: very dark -->
  <path d="M34,310 Q60,320 85,310" stroke="#0a0602" stroke-width="1.6" fill="none"/>
  <!-- Veil remnant ring on stem — a detail that says "old death cap" -->
  <path d="M53,312 C57,310 63,310 67,312" stroke="#a89060" stroke-width="0.9" fill="none" opacity="0.5"/>

  <!-- Mushroom 3: rightmost, medium — dark umber -->
  <path d="M90,350 C89,337 90,326 90,318 L100,318 C100,326 101,337 100,350Z" fill="#c0ae7e"/>
  <!-- Cap: dark, slightly asymmetric — the rim is uneven on one side -->
  <path d="M71,320 C73,306 81,297 94,296 C107,295 115,302 117,313 C119,322 115,329 103,331 L81,330 C74,328 71,326 71,320Z"
    fill="#1a1006"/>
  <circle cx="102" cy="301" r="2"   fill="#322010" opacity="0.5"/>
  <circle cx="88"  cy="299" r="1.5" fill="#2e1a0c" opacity="0.45"/>
  <path d="M73,321 Q95,329 115,321" stroke="#0a0602" stroke-width="1.3" fill="none"/>

  <!-- ═══ FOREGROUND LEAVES ═══ -->

  <!-- Leaf A: large, drooping right-down from lower vine -->
  <g transform="translate(22,230) rotate(52)" fill="#243e12">
    <path d="M0,-26 C15,-15 20,-1 18,13 C16,26 8,32 0,34 C-8,32 -16,26 -18,13 C-20,-1 -15,-15 0,-26Z"/>
    <line x1="0" y1="-22" x2="0"   y2="30"  stroke="#b0a070" stroke-width="0.9"/>
    <line x1="0" y1="-11" x2="-13" y2="-18" stroke="#b0a070" stroke-width="0.65"/>
    <line x1="0" y1="-11" x2="13"  y2="-18" stroke="#b0a070" stroke-width="0.65"/>
    <line x1="0" y1="5"   x2="-12" y2="-2"  stroke="#b0a070" stroke-width="0.65"/>
    <line x1="0" y1="5"   x2="12"  y2="-2"  stroke="#b0a070" stroke-width="0.65"/>
    <line x1="0" y1="20"  x2="-8"  y2="14"  stroke="#b0a070" stroke-width="0.5"/>
    <line x1="0" y1="20"  x2="8"   y2="14"  stroke="#b0a070" stroke-width="0.5"/>
  </g>

  <!-- Leaf B: end of left branch, pointing out-left -->
  <g transform="translate(4,150) rotate(-42)" fill="#1e3410">
    <path d="M0,-24 C14,-13 19,0 17,14 C15,26 8,30 0,32 C-8,30 -15,26 -17,14 C-19,0 -14,-13 0,-24Z"/>
    <line x1="0" y1="-20" x2="0"   y2="28"  stroke="#b0a070" stroke-width="0.85"/>
    <line x1="0" y1="-9"  x2="-13" y2="-16" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="-9"  x2="13"  y2="-16" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="8"   x2="-11" y2="1"   stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="8"   x2="11"  y2="1"   stroke="#b0a070" stroke-width="0.62"/>
  </g>

  <!-- Leaf C: off right branch ~(110,78) -->
  <g transform="translate(114,82) rotate(38)" fill="#243e14">
    <path d="M0,-20 C12,-10 16,1 14,13 C12,22 6,26 0,28 C-6,26 -12,22 -14,13 C-16,1 -12,-10 0,-20Z"/>
    <line x1="0" y1="-16" x2="0"   y2="24"  stroke="#b0a070" stroke-width="0.8"/>
    <line x1="0" y1="-7"  x2="-10" y2="-13" stroke="#b0a070" stroke-width="0.58"/>
    <line x1="0" y1="-7"  x2="10"  y2="-13" stroke="#b0a070" stroke-width="0.58"/>
    <line x1="0" y1="7"   x2="-9"  y2="1"   stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="7"   x2="9"   y2="1"   stroke="#b0a070" stroke-width="0.55"/>
  </g>

  <!-- Leaf D: upper right branch ~(200,46) -->
  <g transform="translate(200,46) rotate(15)" fill="#1e3410">
    <path d="M0,-18 C11,-9 14,1 12,12 C10,20 5,22 0,24 C-5,22 -10,20 -12,12 C-14,1 -11,-9 0,-18Z"/>
    <line x1="0" y1="-14" x2="0"  y2="20"  stroke="#b0a070" stroke-width="0.75"/>
    <line x1="0" y1="-5"  x2="-9" y2="-11" stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="-5"  x2="9"  y2="-11" stroke="#b0a070" stroke-width="0.55"/>
  </g>

  <!-- Leaf E: small, near upper vine ~y=30 — darker -->
  <g transform="translate(60,32) rotate(-28)" fill="#304a1c">
    <path d="M0,-14 C8,-7 10,1 9,9 C7,16 3,18 0,18 C-3,18 -7,16 -9,9 C-10,1 -8,-7 0,-14Z"/>
    <line x1="0" y1="-10" x2="0" y2="15" stroke="#b0a070" stroke-width="0.65"/>
  </g>

  <!-- Leaf F: off thin branch ~(90,14) -->
  <g transform="translate(90,14) rotate(32)" fill="#243e14">
    <path d="M0,-12 C7,-6 9,1 8,8 C6,13 3,15 0,15 C-3,15 -6,13 -8,8 C-9,1 -7,-6 0,-12Z"/>
    <line x1="0" y1="-9" x2="0" y2="12" stroke="#b0a070" stroke-width="0.6"/>
  </g>

  <!-- ═══ TENDRILS ═══ -->
  <path d="M8,118 C4,110 10,103 16,106 C20,108 18,115 13,114 C10,113 10,109 13,108"
    stroke="#162808" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M106,6 C114,2 120,7 118,14 C116,19 109,18 108,13"
    stroke="#182c0a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M300,0 C296,8 298,16 292,14 C288,12 290,6 294,8"
    stroke="#162808" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- ═══ BERRY CLUSTER — dark, not festive (nightshade, not holly) ═══ -->
  <path d="M136,64 C148,58 156,54 164,50" stroke="#162808" stroke-width="1" fill="none"/>
  <!-- Berries: near-black purple — poisonous, not decorative -->
  <circle cx="166" cy="50" r="4"   fill="#1a0c14"/>
  <circle cx="158" cy="46" r="3"   fill="#140a10"/>
  <circle cx="172" cy="44" r="3.2" fill="#1a0c14"/>
  <circle cx="164" cy="40" r="2.5" fill="#16080e"/>
  <!-- Tiny highlights — barely there, not cheerful -->
  <circle cx="165" cy="48" r="1"   fill="#3a2030" opacity="0.4"/>
  <circle cx="157" cy="44" r="0.7" fill="#3a2030" opacity="0.35"/>

  <!-- ═══ HANGING MOSS STRANDS from vine ═══ -->
  <path d="M16,270 C15,280 17,290 15,300" stroke="#364020" stroke-width="0.8"  fill="none" opacity="0.6"/>
  <path d="M14,272 C12,282 14,292 12,302" stroke="#364020" stroke-width="0.6"  fill="none" opacity="0.5"/>
  <path d="M20,140 C21,150 19,158 21,166" stroke="#364020" stroke-width="0.65" fill="none" opacity="0.55"/>

</svg>
