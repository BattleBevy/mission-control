    <line x1="0" y1="-11" x2="-13" y2="-18" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="-11" x2="13"  y2="-18" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="7"   x2="-11" y2="0"   stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="7"   x2="11"  y2="0"   stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="22"  x2="-8"  y2="16"  stroke="#b0a070" stroke-width="0.5"/>
