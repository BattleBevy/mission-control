    <line x1="0" y1="8"   x2="-9"  y2="2"   stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="8"   x2="9"   y2="2"   stroke="#b0a070" stroke-width="0.55"/>
  </g>

  <!-- Leaf C: off left branch ~(24,102) -->
  <g transform="translate(22,104) rotate(-26)" fill="#1e3410">
    <path d="M0,-18 C11,-9 14,1 12,12 C10,20 5,22 0,24 C-5,22 -10,20 -12,12 C-14,1 -11,-9 0,-18Z"/>
    <line x1="0" y1="-14" x2="0"  y2="20"  stroke="#b0a070" stroke-width="0.74"/>
    <line x1="0" y1="-5"  x2="-9" y2="-11" stroke="#b0a070" stroke-width="0.55"/>
    <line x1="0" y1="-5"  x2="9"  y2="-11" stroke="#b0a070" stroke-width="0.55"/>
