  <!-- ═══ HANGING MOSS STRANDS ═══ -->
  <path d="M114,110 C113,118 115,126 113,134" stroke="#364020" stroke-width="0.7"  fill="none" opacity="0.6"/>
  <path d="M112,112 C110,120 112,128 110,136" stroke="#364020" stroke-width="0.55" fill="none" opacity="0.5"/>
  <path d="M190,48"  stroke="#364020" stroke-width="0" fill="none"/>
  <path d="M194,50 C193,58 195,66 193,74"    stroke="#364020" stroke-width="0.6"  fill="none" opacity="0.52"/>

