  <circle cx="222" cy="5"  r="3.5" fill="#1a0c14"/>
  <circle cx="232" cy="3"  r="2.8" fill="#140a10"/>
  <circle cx="228" cy="10" r="3"   fill="#1a0c14"/>
  <circle cx="218" cy="12" r="2.2" fill="#16080e"/>
  <circle cx="221" cy="4"  r="0.9" fill="#3a2030" opacity="0.35"/>

  <!-- ═══ FOREGROUND LEAVES ═══ -->

  <!-- Leaf A: large, off upper vine ~(196,52) -->
  <g transform="translate(196,52) rotate(138)" fill="#1e3410">
    <path d="M0,-24 C14,-13 19,0 17,13 C15,24 8,28 0,30 C-8,28 -15,24 -17,13 C-19,0 -14,-13 0,-24Z"/>
    <line x1="0" y1="-20" x2="0"   y2="26"  stroke="#b0a070" stroke-width="0.85"/>
    <line x1="0" y1="-9"  x2="-13" y2="-16" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="-9"  x2="13"  y2="-16" stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="6"   x2="-11" y2="0"   stroke="#b0a070" stroke-width="0.62"/>
    <line x1="0" y1="6"   x2="11"  y2="0"   stroke="#b0a070" stroke-width="0.62"/>
  </g>

