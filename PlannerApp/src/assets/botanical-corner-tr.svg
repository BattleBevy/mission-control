  <path d="M118,113 C130,109 148,107 162,110" stroke="#c4b47a" stroke-width="0.6" fill="none" opacity="0.45"/>
  <path d="M124,117 C136,113 150,112 162,115" stroke="#0a0602" stroke-width="0.5" fill="none" opacity="0.4"/>

  <!-- ═══ LICHEN PATCHES ═══ -->
  <ellipse cx="220" cy="14"  rx="6"   ry="2"   fill="#4e5428" opacity="0.55" transform="rotate(-14,220,14)"/>
  <ellipse cx="160" cy="62"  rx="5"   ry="1.8" fill="#566038" opacity="0.5"  transform="rotate(10,160,62)"/>
  <ellipse cx="100" cy="118" rx="4.5" ry="1.6" fill="#4e5428" opacity="0.45" transform="rotate(-6,100,118)"/>
  <circle  cx="50"  cy="162" r="2.2"            fill="#5a6030" opacity="0.4"/>
  <ellipse cx="10"  cy="208" rx="4"   ry="1.5" fill="#4e5428" opacity="0.45" transform="rotate(8,10,208)"/>
  <circle  cx="130" cy="6"   r="2"              fill="#566038" opacity="0.4"/>

