  <!-- ═══ TENDRILS ═══ -->
  <path d="M4,112 C-2,108 0,101 6,103 C10,104 9,110 5,110 C3,110 2,107 5,106"
    stroke="#162808" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M0,230 C6,238 14,234 12,228 C10,222 3,224 4,230"
