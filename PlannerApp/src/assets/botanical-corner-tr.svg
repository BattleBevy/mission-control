  <ellipse cx="174" cy="54"  rx="4.5" ry="2.5" fill="#060e04" opacity="0.4"/>
  <ellipse cx="114" cy="108" rx="4"   ry="2.2" fill="#060e04" opacity="0.38"/>
  <ellipse cx="58"  cy="160" rx="3.5" ry="2"   fill="#060e04" opacity="0.35"/>

  <!-- Left branch at mid-height -->
  <path d="M106,112 C86,106 66,102 46,100 C28,98 14,104 4,112"
    stroke="#122008" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Upper branch -->
  <path d="M188,46 C178,32 166,20 152,10 C142,4 132,0 122,0"
