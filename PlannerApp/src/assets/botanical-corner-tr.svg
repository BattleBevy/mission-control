  <g transform="translate(34,180) rotate(162)" fill="#243e14">
    <path d="M0,-14 C8,-7 10,1 9,9 C7,15 3,17 0,17 C-3,17 -7,15 -9,9 C-10,1 -8,-7 0,-14Z"/>
