<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 270">

  <!-- ═══ BACK LEAVES ═══ -->

  <!-- Back leaf: large, upper-right area, sweeping in from corner -->
  <g transform="translate(214,30) rotate(148)" fill="#3a6020" opacity="0.8">
    <path d="M0,-26 C15,-14 20,0 18,14 C16,26 8,32 0,34 C-8,32 -16,26 -18,14 C-20,0 -15,-14 0,-26Z"/>
    <line x1="0" y1="-22" x2="0" y2="30" stroke="#c8b89a" stroke-width="0.85"/>
    <line x1="0" y1="-11" x2="-13" y2="-18" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="-11" x2="13" y2="-18" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="7" x2="-11" y2="0" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="7" x2="11" y2="0" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="22" x2="-8" y2="16" stroke="#c8b89a" stroke-width="0.5"/>
    <line x1="0" y1="22" x2="8" y2="16" stroke="#c8b89a" stroke-width="0.5"/>
  </g>

  <!-- Back leaf: hanging down from mid-vine -->
  <g transform="translate(100,120) rotate(112)" fill="#2d4e1a" opacity="0.8">
    <path d="M0,-20 C12,-10 16,1 14,13 C12,23 6,27 0,28 C-6,27 -12,23 -14,13 C-16,1 -12,-10 0,-20Z"/>
    <line x1="0" y1="-16" x2="0" y2="24" stroke="#c8b89a" stroke-width="0.75"/>
    <line x1="0" y1="-6" x2="-10" y2="-13" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="-6" x2="10" y2="-13" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- ═══ MAIN VINE + BRANCHES ═══ -->

  <!-- Main vine: enters from top-right, sweeps down-left across the composition -->
  <path d="M240,0 C218,16 196,34 174,54 C152,72 134,88 114,108 C96,126 78,142 58,160 C40,176 22,190 4,206 C-4,214 -8,222 0,230"
    stroke="#1e3a14" stroke-width="6.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Branch sweeping left at mid-height -->
  <path d="M106,112 C86,106 66,102 46,100 C28,98 14,104 4,112"
    stroke="#253d17" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Short branch going upward from upper vine -->
  <path d="M188,46 C178,32 166,20 152,10 C142,4 132,0 122,0"
    stroke="#2a4818" stroke-width="3.2" fill="none" stroke-linecap="round"/>

  <!-- Thin tendril branch from lower vine area -->
  <path d="M60,158 C48,168 38,176 26,180 C16,184 8,184 4,180"
    stroke="#2d4e1a" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- ═══ BERRY CLUSTER near top-right entry ═══ -->
  <path d="M230,6 C226,10 222,12 218,12" stroke="#2a4818" stroke-width="1" fill="none"/>
  <circle cx="222" cy="5" r="3.5" fill="#5c2a1e"/>
  <circle cx="232" cy="3" r="2.8" fill="#6b3020"/>
  <circle cx="228" cy="10" r="3" fill="#5c2a1e"/>
  <circle cx="218" cy="12" r="2.2" fill="#7a3828"/>
  <!-- Highlights -->
  <circle cx="221" cy="4" r="1.1" fill="#a05040" opacity="0.5"/>

  <!-- ═══ FOREGROUND LEAVES ═══ -->

  <!-- Leaf A: large, draped off upper vine ~(194,48) -->
  <g transform="translate(196,52) rotate(138)" fill="#2d4e1a">
    <path d="M0,-24 C14,-13 19,0 17,13 C15,24 8,28 0,30 C-8,28 -15,24 -17,13 C-19,0 -14,-13 0,-24Z"/>
    <line x1="0" y1="-20" x2="0" y2="26" stroke="#c8b89a" stroke-width="0.85"/>
    <line x1="0" y1="-9" x2="-13" y2="-16" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="-9" x2="13" y2="-16" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="6" x2="-11" y2="0" stroke="#c8b89a" stroke-width="0.62"/>
    <line x1="0" y1="6" x2="11" y2="0" stroke="#c8b89a" stroke-width="0.62"/>
  </g>

  <!-- Leaf B: medium, mid-vine ~(126,102) -->
  <g transform="translate(128,106) rotate(118)" fill="#3a6020">
    <path d="M0,-20 C12,-10 16,2 14,14 C12,22 6,26 0,28 C-6,26 -12,22 -14,14 C-16,2 -12,-10 0,-20Z"/>
    <line x1="0" y1="-16" x2="0" y2="24" stroke="#c8b89a" stroke-width="0.78"/>
    <line x1="0" y1="-6" x2="-10" y2="-13" stroke="#c8b89a" stroke-width="0.57"/>
    <line x1="0" y1="-6" x2="10" y2="-13" stroke="#c8b89a" stroke-width="0.57"/>
    <line x1="0" y1="8" x2="-9" y2="2" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="8" x2="9" y2="2" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- Leaf C: medium, off left branch ~(24,102) -->
  <g transform="translate(22,104) rotate(-26)" fill="#2d4e1a">
    <path d="M0,-18 C11,-9 14,1 12,12 C10,20 5,22 0,24 C-5,22 -10,20 -12,12 C-14,1 -11,-9 0,-18Z"/>
    <line x1="0" y1="-14" x2="0" y2="20" stroke="#c8b89a" stroke-width="0.74"/>
    <line x1="0" y1="-5" x2="-9" y2="-11" stroke="#c8b89a" stroke-width="0.55"/>
    <line x1="0" y1="-5" x2="9" y2="-11" stroke="#c8b89a" stroke-width="0.55"/>
  </g>

  <!-- Leaf D: small, off upper branch ~(152,10) -->
  <g transform="translate(148,12) rotate(34)" fill="#4e7030">
    <path d="M0,-14 C8,-7 10,1 9,9 C7,15 3,17 0,17 C-3,17 -7,15 -9,9 C-10,1 -8,-7 0,-14Z"/>
    <line x1="0" y1="-11" x2="0" y2="14" stroke="#c8b89a" stroke-width="0.65"/>
  </g>

  <!-- Leaf E: small, off lower vine ~(36,178) -->
  <g transform="translate(34,180) rotate(162)" fill="#3a6020">
    <path d="M0,-14 C8,-7 10,1 9,9 C7,15 3,17 0,17 C-3,17 -7,15 -9,9 C-10,1 -8,-7 0,-14Z"/>
    <line x1="0" y1="-11" x2="0" y2="14" stroke="#c8b89a" stroke-width="0.65"/>
    <line x1="0" y1="-4" x2="-7" y2="-9" stroke="#c8b89a" stroke-width="0.5"/>
    <line x1="0" y1="-4" x2="7" y2="-9" stroke="#c8b89a" stroke-width="0.5"/>
  </g>

  <!-- ═══ TENDRILS ═══ -->
  <!-- Tendril at end of left branch -->
  <path d="M4,112 C-2,108 0,101 6,103 C10,104 9,110 5,110 C3,110 2,107 5,106"
    stroke="#2a4818" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- Tendril at vine tail -->
  <path d="M0,230 C6,238 14,234 12,228 C10,222 3,224 4,230"
    stroke="#2a4818" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Tendril off thin lower branch -->
  <path d="M4,180 C-2,176 -2,170 4,170 C8,170 8,176 4,176"
    stroke="#2d4e1a" stroke-width="1" fill="none" stroke-linecap="round"/>

</svg>
