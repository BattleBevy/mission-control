<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game World Codex</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #ede5d8;
      --surface: #faf5eb;
      --border:  #d4b896;
      --text:    #2a1a08;
      --muted:   #7a5c3c;
      --success: #4e6b35;
      --warn:    #c87820;
      --danger:  #8b3530;
      --codex:   #6b4a7a;
      --codex-lt: rgba(107,74,122,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 3px solid var(--codex);
      padding: 0.875rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .site-title {
      font-family: Georgia, serif;
      font-size: 1.375rem;
      color: var(--codex);
      cursor: pointer;
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .nav-link {
      font-size: 0.875rem;
      color: var(--muted);
      cursor: pointer;
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }

    .nav-link:hover { background: var(--codex-lt); color: var(--codex); }
    .nav-link.active { background: var(--codex-lt); color: var(--codex); font-weight: 600; }

    .back-link {
      margin-left: auto;
      font-size: 0.8125rem;
      color: var(--muted);
      text-decoration: none;
    }

    #main {
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    /* ── Typography ── */
    .page-title {
      font-family: Georgia, serif;
      font-size: 1.75rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .page-title .actions { margin-left: auto; display: flex; gap: 0.5rem; align-items: center; }

    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-bottom: 0.875rem;
      display: flex;
      gap: 0.35rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .crumb { color: var(--codex); cursor: pointer; text-decoration: underline; }

    /* ── Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.125rem;
      cursor: pointer;
      transition: box-shadow 0.15s, transform 0.12s;
    }

    .card:hover { box-shadow: 0 4px 14px rgba(80,45,10,0.12); transform: translateY(-1px); }
    .card-title { font-family: Georgia, serif; font-size: 1rem; margin-bottom: 0.2rem; }
    .card-meta  { font-size: 0.8125rem; color: var(--muted); }

    /* ── Entity list rows ── */
    .entity-list {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }

    .entity-row {
      display: flex;
      align-items: center;
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
      cursor: pointer;
      transition: background 0.1s;
    }

    .entity-row:last-child { border-bottom: none; }
    .entity-row:hover { background: var(--codex-lt); }
    .entity-row .row-name { font-weight: 500; flex: 1; min-width: 0; }
    .entity-row .row-meta { font-size: 0.8125rem; color: var(--muted); white-space: nowrap; }

    .row-actions {
      display: flex;
      gap: 0.35rem;
      opacity: 0;
      transition: opacity 0.1s;
      flex-shrink: 0;
    }

    .entity-row:hover .row-actions { opacity: 1; }

    /* ── Detail sections ── */
    .detail-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.125rem 1.25rem;
      margin-bottom: 1rem;
    }

    .detail-section h3 {
      font-family: Georgia, serif;
      font-size: 0.9375rem;
      color: var(--codex);
      margin-bottom: 0.75rem;
      padding-bottom: 0.375rem;
      border-bottom: 1px solid var(--border);
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 0.75rem;
    }

    .info-item label {
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: block;
      margin-bottom: 0.2rem;
    }

    .info-item .val { font-size: 0.9375rem; }

    .trait-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.875rem; }

    .trait-tag {
      background: var(--codex-lt);
      color: var(--codex);
      border: 1px solid rgba(107,74,122,0.25);
      border-radius: 99px;
      padding: 0.175rem 0.6rem;
      font-size: 0.8125rem;
    }

    .long-text { line-height: 1.75; white-space: pre-wrap; font-size: 0.9375rem; }

    /* ── Relationships ── */
    .rel-list { display: flex; flex-direction: column; gap: 0.625rem; }

    .rel-item { display: flex; gap: 0.5rem; align-items: flex-start; flex-wrap: wrap; }

    .rel-name {
      font-weight: 600;
      color: var(--codex);
      cursor: pointer;
      text-decoration: underline;
      white-space: nowrap;
    }

    .rel-label {
      font-size: 0.8rem;
      background: rgba(212,184,150,0.5);
      padding: 0.1rem 0.45rem;
      border-radius: 99px;
      white-space: nowrap;
    }

    .rel-notes { font-size: 0.875rem; color: var(--muted); }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
    }

    .badge-original    { background: #e8dcc8; color: var(--muted); }
    .badge-in-progress { background: rgba(200,120,32,0.15); color: var(--warn); }
    .badge-renovated   { background: rgba(78,107,53,0.15); color: var(--success); }
    .badge-rebuilt     { background: var(--codex-lt); color: var(--codex); }

    /* ── Chronicle ── */
    .chronicle-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--codex);
      border-radius: 0 10px 10px 0;
      padding: 1rem 1.25rem;
      margin-bottom: 0.875rem;
    }

    .chronicle-num  { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.2rem; }
    .chronicle-home { font-family: Georgia, serif; font-size: 1.05rem; color: var(--codex); cursor: pointer; text-decoration: underline; margin-bottom: 0.25rem; }
    .chronicle-notes { font-size: 0.875rem; line-height: 1.65; white-space: pre-wrap; color: var(--muted); margin-top: 0.375rem; }

    /* ── Stats ── */
    .stats-bar { display: flex; gap: 2rem; margin-bottom: 1.75rem; flex-wrap: wrap; }
    .stat .num { font-size: 1.75rem; font-weight: 700; color: var(--codex); line-height: 1; }
    .stat .lbl { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.875rem;
    }

    .section-header h2 { font-family: Georgia, serif; font-size: 1.25rem; }

    /* ── Neighborhood grouping ── */
    .nbhood-section { margin-bottom: 1.75rem; }

    .nbhood-title {
      font-family: Georgia, serif;
      font-size: 1.0625rem;
      color: var(--codex);
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nbhood-count { font-size: 0.8125rem; color: var(--muted); font-family: sans-serif; font-weight: normal; }

    .empty { text-align: center; color: var(--muted); padding: 1.5rem; font-style: italic; }

    .wiki-link { color: var(--codex); text-decoration: underline; cursor: pointer; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 0.9rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.12s;
      font-family: inherit;
    }

    .btn:hover { opacity: 0.82; }
    .btn-primary { background: var(--codex); color: #fff; }
    .btn-ghost   { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { background: var(--bg); opacity: 1; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-sm      { padding: 0.25rem 0.6rem; font-size: 0.8125rem; }

    .quick-actions { display: flex; gap: 0.625rem; flex-wrap: wrap; margin-top: 0.5rem; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(42,26,8,0.5);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    .modal-backdrop.open { display: block; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .modal h2 { font-family: Georgia, serif; font-size: 1.25rem; margin-bottom: 1.25rem; }

    .form-group { margin-bottom: 0.875rem; }

    .form-group > label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.5rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { outline: 2px solid var(--codex); outline-offset: 1px; }

    .form-group textarea { resize: vertical; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    .modal-footer { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.25rem; }

    /* Relationship builder */
    .rel-builder { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }

    .rel-builder-list {
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      max-height: 160px;
      overflow-y: auto;
    }

    .rbi {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      border-radius: 4px;
      padding: 0.35rem 0.5rem;
      font-size: 0.875rem;
    }

    .rbi-name  { font-weight: 500; flex: 1; }
    .rbi-label { color: var(--muted); font-size: 0.8rem; }

    .rel-add-form {
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .rel-add-row { display: flex; gap: 0.375rem; }

    .rel-add-form select,
    .rel-add-form input {
      padding: 0.35rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--text);
      flex: 1;
    }

    /* Checkbox group */
    .checkbox-group {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem;
      max-height: 180px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .checkbox-group label {
      display: flex !important;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem !important;
      font-weight: normal !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      color: var(--text) !important;
      cursor: pointer;
    }

    .checkbox-group input[type="checkbox"] { width: auto; }

    .fairy-check-wrap {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.875rem;
    }

    .fairy-check-wrap input { width: auto; }
    .fairy-check-wrap label { font-size: 0.9375rem; color: var(--codex); font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>

<header>
  <div class="site-title" data-nav="home">✦ Game World Codex</div>
  <nav class="nav-links">
    <span class="nav-link" data-nav="all-characters">Characters</span>
    <span class="nav-link" data-nav="all-households">Households</span>
    <span class="nav-link" data-nav="all-homes">Homes &amp; Lots</span>
    <span class="nav-link" data-nav="chronicle">The Fairy's Chronicle</span>
  </nav>
  <a href="../index.html" class="back-link">← Mission Control</a>
</header>

<div id="main"></div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn">Save</button>
    </div>
  </div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────

const KEY = 'codex-v1';

function blank() {
  return { characters: [], households: [], homes: [], nextCharId: 1, nextHouseholdId: 1, nextHomeId: 1 };
}

function load() {
  try { const r = localStorage.getItem(KEY); return r ? { ...blank(), ...JSON.parse(r) } : blank(); }
  catch { return blank(); }
}

function save() { localStorage.setItem(KEY, JSON.stringify(D)); }

let D = load();

// ── Helpers ───────────────────────────────────────────────────────────────────

const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function byId(arr, id) { return arr.find(x => x.id === id); }
function charName(id)  { const c = byId(D.characters, id); return c ? c.name : '(unknown)'; }
function fairy()       { return D.characters.find(c => c.isTheFairy); }

function renovBadge(s) {
  const map = { original: 'Original', 'in-progress': 'In Progress', renovated: 'Renovated', rebuilt: 'Rebuilt' };
  return `<span class="badge badge-${s}">${map[s] || s}</span>`;
}

function neighborhoods() {
  const seen = new Set(), out = [];
  D.homes.forEach(h => { if (h.neighborhood && !seen.has(h.neighborhood)) { seen.add(h.neighborhood); out.push(h.neighborhood); } });
  return out.sort();
}

// ── Router ────────────────────────────────────────────────────────────────────

let curView = 'home', curId = null;

function navigate(view, id = null) {
  curView = view; curId = id;
  renderMain();
  window.scrollTo(0, 0);
}

function renderMain() {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.dataset.nav === curView));
  const el = document.getElementById('main');
  switch (curView) {
    case 'home':           el.innerHTML = vHome();           break;
    case 'all-characters': el.innerHTML = vAllChars();       break;
    case 'character':      el.innerHTML = vChar(curId);      break;
    case 'all-households': el.innerHTML = vAllHH();          break;
    case 'household':      el.innerHTML = vHH(curId);        break;
    case 'all-homes':      el.innerHTML = vAllHomes();       break;
    case 'home-detail':    el.innerHTML = vHomeDetail(curId);break;
    case 'chronicle':      el.innerHTML = vChronicle();      break;
    default:               el.innerHTML = vHome();
  }
}

// ── Views ─────────────────────────────────────────────────────────────────────

function vHome() {
  const f = fairy();
  const nbhoods = neighborhoods();

  const nbCards = nbhoods.length === 0
    ? `<p class="empty">No homes added yet — add one to get started.</p>`
    : nbhoods.map(n => {
        const ct = D.homes.filter(h => h.neighborhood === n).length;
        return `<div class="card" data-nav="all-homes" data-filter="${esc(n)}">
          <div class="card-title">${esc(n)}</div>
          <div class="card-meta">${ct} home${ct !== 1 ? 's' : ''}</div>
        </div>`;
      }).join('');

  return `
    <div style="padding-top:0.25rem">
      <div class="stats-bar">
        <div class="stat"><div class="num">${D.characters.length}</div><div class="lbl">Characters</div></div>
        <div class="stat"><div class="num">${D.households.length}</div><div class="lbl">Households</div></div>
        <div class="stat"><div class="num">${D.homes.length}</div><div class="lbl">Homes</div></div>
        ${f ? `<div class="stat"><div class="num">✦</div><div class="lbl">${esc(f.name)}</div></div>` : ''}
      </div>

      <div class="section-header">
        <h2>Neighborhoods</h2>
        <button class="btn btn-primary btn-sm" onclick="openModal('home',null)">+ Add Home</button>
      </div>
      <div class="card-grid">${nbCards}</div>

      <div class="quick-actions">
        <button class="btn btn-ghost" onclick="openModal('character',null)">+ New Character</button>
        <button class="btn btn-ghost" onclick="openModal('household',null)">+ New Household</button>
      </div>
    </div>`;
}

function vAllChars() {
  const sorted = [...D.characters].sort((a,b) => a.name.localeCompare(b.name));
  const rows = sorted.length === 0
    ? `<div class="empty">No characters yet.</div>`
    : sorted.map(c => `
        <div class="entity-row" data-nav="character" data-id="${c.id}">
          <div class="row-name">${esc(c.name)}${c.isTheFairy ? ' ✦' : ''}</div>
          <div class="row-meta">${esc(c.occultType || 'Human')} · ${esc(c.career || '—')}</div>
          <div class="row-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="openModal('character',${c.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteChar(${c.id})">Del</button>
          </div>
        </div>`).join('');

  return `
    <div class="section-header">
      <h2>All Characters</h2>
      <button class="btn btn-primary btn-sm" onclick="openModal('character',null)">+ Add</button>
    </div>
    <div class="entity-list">${rows}</div>`;
}

function vChar(id) {
  const c = byId(D.characters, id);
  if (!c) return `<p class="empty">Character not found.</p>`;

  const hh     = c.householdId ? byId(D.households, c.householdId) : null;
  const hhHome = hh?.homeId    ? byId(D.homes, hh.homeId)          : null;

  const traitHtml = (c.traits || []).length
    ? `<div style="margin-top:0.875rem">
         <div style="font-size:0.6875rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.4rem">Traits</div>
         <div class="trait-list">${(c.traits).map(t => `<span class="trait-tag">${esc(t)}</span>`).join('')}</div>
       </div>` : '';

  const relHtml = (c.relationships || []).map(r => {
    const other = byId(D.characters, r.charId);
    return `<div class="rel-item">
      <span class="rel-name wiki-link" data-nav="character" data-id="${r.charId}">${esc(other?.name || '(unknown)')}</span>
      ${r.label ? `<span class="rel-label">${esc(r.label)}</span>` : ''}
      ${r.notes ? `<span class="rel-notes">— ${esc(r.notes)}</span>` : ''}
    </div>`;
  }).join('');

  const chronicleHtml = c.isTheFairy ? (() => {
    const visits = D.homes.filter(h => h.storyOrder != null).sort((a,b) => a.storyOrder - b.storyOrder);
    return `<div class="detail-section">
      <h3>Chronicle of Visits</h3>
      ${visits.length === 0
        ? `<p style="color:var(--muted);font-style:italic;font-size:0.875rem">No visits recorded yet. Set a Story Order on a Home to begin.</p>`
        : visits.map(h => `
          <div class="chronicle-entry">
            <div class="chronicle-num">Visit #${h.storyOrder}</div>
            <div class="chronicle-home wiki-link" data-nav="home-detail" data-id="${h.id}">${esc(h.lotName)}</div>
            ${h.fairyVisitNotes ? `<div class="chronicle-notes">${esc(h.fairyVisitNotes)}</div>` : ''}
          </div>`).join('')}
    </div>`;
  })() : '';

  return `
    <div class="breadcrumb">
      <span class="crumb" data-nav="all-characters">Characters</span> › ${esc(c.name)}
    </div>
    <div class="page-title">
      ${esc(c.name)}${c.isTheFairy ? ' <span style="font-size:1rem;color:var(--codex)">✦ The Fairy</span>' : ''}
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openModal('character',${c.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteChar(${c.id})">Delete</button>
      </div>
    </div>

    <div class="detail-section">
      <h3>Profile</h3>
      <div class="info-grid">
        <div class="info-item"><label>Occult Type</label><div class="val">${esc(c.occultType || 'Human')}</div></div>
        <div class="info-item"><label>Career</label><div class="val">${esc(c.career || '—')}</div></div>
        <div class="info-item"><label>Aspiration</label><div class="val">${esc(c.aspiration || '—')}</div></div>
        <div class="info-item"><label>Household</label><div class="val">${hh ? `<span class="wiki-link" data-nav="household" data-id="${hh.id}">${esc(hh.name)}</span>` : '—'}</div></div>
        ${hhHome ? `<div class="info-item"><label>Home</label><div class="val"><span class="wiki-link" data-nav="home-detail" data-id="${hhHome.id}">${esc(hhHome.lotName)}</span></div></div>` : ''}
      </div>
      ${traitHtml}
    </div>

    ${c.backstory ? `<div class="detail-section"><h3>Their Story</h3><div class="long-text">${esc(c.backstory)}</div></div>` : ''}
    ${relHtml    ? `<div class="detail-section"><h3>Relationships</h3><div class="rel-list">${relHtml}</div></div>` : ''}
    ${chronicleHtml}`;
}

function vAllHH() {
  const sorted = [...D.households].sort((a,b) => a.name.localeCompare(b.name));
  const rows = sorted.length === 0
    ? `<div class="empty">No households yet.</div>`
    : sorted.map(hh => {
        const names = (hh.memberIds || []).map(charName).join(', ');
        return `
          <div class="entity-row" data-nav="household" data-id="${hh.id}">
            <div class="row-name">${esc(hh.name)}</div>
            <div class="row-meta">${esc(names || 'No members')}</div>
            <div class="row-actions" onclick="event.stopPropagation()">
              <button class="btn btn-ghost btn-sm" onclick="openModal('household',${hh.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteHH(${hh.id})">Del</button>
            </div>
          </div>`;
      }).join('');

  return `
    <div class="section-header">
      <h2>All Households</h2>
      <button class="btn btn-primary btn-sm" onclick="openModal('household',null)">+ Add</button>
    </div>
    <div class="entity-list">${rows}</div>`;
}

function vHH(id) {
  const hh = byId(D.households, id);
  if (!hh) return `<p class="empty">Household not found.</p>`;

  const home = hh.homeId ? byId(D.homes, hh.homeId) : null;
  const memberRows = (hh.memberIds || []).map(mid => {
    const c = byId(D.characters, mid);
    if (!c) return '';
    return `<div class="entity-row" data-nav="character" data-id="${c.id}">
      <div class="row-name">${esc(c.name)}${c.isTheFairy?' ✦':''}</div>
      <div class="row-meta">${esc(c.occultType||'Human')} · ${esc(c.career||'—')}</div>
    </div>`;
  }).join('');

  return `
    <div class="breadcrumb">
      <span class="crumb" data-nav="all-households">Households</span> › ${esc(hh.name)}
    </div>
    <div class="page-title">
      ${esc(hh.name)}
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openModal('household',${hh.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteHH(${hh.id})">Delete</button>
      </div>
    </div>

    <div class="detail-section">
      <h3>About This Household</h3>
      ${hh.description
        ? `<p class="long-text">${esc(hh.description)}</p>`
        : `<p style="color:var(--muted);font-style:italic">No description yet.</p>`}
      ${home ? `
        <div style="margin-top:0.875rem">
          <label style="font-size:0.6875rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)">Home</label>
          <div style="margin-top:0.2rem">
            <span class="wiki-link" data-nav="home-detail" data-id="${home.id}">${esc(home.lotName)}</span>
            <span style="color:var(--muted);font-size:0.875rem"> · ${esc(home.neighborhood)}</span>
            ${renovBadge(home.renovationStatus)}
          </div>
        </div>` : ''}
    </div>

    ${memberRows ? `<div class="detail-section"><h3>Members</h3><div class="entity-list" style="margin:0">${memberRows}</div></div>` : ''}`;
}

function vAllHomes() {
  const filter = curId && typeof curId === 'string' ? curId : null;
  const homes = filter
    ? D.homes.filter(h => h.neighborhood === filter).sort((a,b) => (a.designOrder||9999)-(b.designOrder||9999))
    : [...D.homes].sort((a,b) => (a.neighborhood||'').localeCompare(b.neighborhood||'') || (a.designOrder||9999)-(b.designOrder||9999));

  let content;
  if (homes.length === 0) {
    content = `<div class="empty">No homes ${filter ? 'in this neighborhood ' : ''}yet.</div>`;
  } else if (filter) {
    content = `<div class="entity-list">${homes.map(homeRow).join('')}</div>`;
  } else {
    const byN = {};
    homes.forEach(h => { const n = h.neighborhood||'Unknown'; (byN[n] = byN[n]||[]).push(h); });
    content = Object.entries(byN).sort(([a],[b])=>a.localeCompare(b)).map(([n,hs]) => `
      <div class="nbhood-section">
        <div class="nbhood-title">${esc(n)} <span class="nbhood-count">${hs.length} home${hs.length!==1?'s':''}</span></div>
        <div class="entity-list">${hs.map(homeRow).join('')}</div>
      </div>`).join('');
  }

  return `
    <div class="breadcrumb">${filter ? `<span class="crumb" data-nav="all-homes" data-filter="">All Homes</span> › ${esc(filter)}` : 'Homes &amp; Lots'}</div>
    <div class="section-header">
      <h2>${filter ? esc(filter) : 'Homes &amp; Lots'}</h2>
      <button class="btn btn-primary btn-sm" onclick="openModal('home',null)">+ Add</button>
    </div>
    ${content}`;
}

function homeRow(h) {
  const hh = h.householdId ? byId(D.households, h.householdId) : null;
  return `
    <div class="entity-row" data-nav="home-detail" data-id="${h.id}">
      <div class="row-name">${esc(h.lotName)}</div>
      <div class="row-meta">${hh ? esc(hh.name) : 'Unoccupied'}${h.storyOrder!=null?' · Visit #'+h.storyOrder:''}</div>
      <div style="flex-shrink:0">${renovBadge(h.renovationStatus)}</div>
      <div class="row-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openModal('home',${h.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteHome(${h.id})">Del</button>
      </div>
    </div>`;
}

function vHomeDetail(id) {
  const h = byId(D.homes, id);
  if (!h) return `<p class="empty">Home not found.</p>`;

  const hh = h.householdId ? byId(D.households, h.householdId) : null;
  const members = hh ? (hh.memberIds||[]).map(mid => {
    const c = byId(D.characters, mid);
    return c ? `<span class="wiki-link" data-nav="character" data-id="${c.id}">${esc(c.name)}</span>` : '';
  }).filter(Boolean).join(', ') : '';

  return `
    <div class="breadcrumb">
      <span class="crumb" data-nav="all-homes" data-filter="">Homes &amp; Lots</span>
      ${h.neighborhood ? ` › <span class="crumb" data-nav="all-homes" data-filter="${esc(h.neighborhood)}">${esc(h.neighborhood)}</span>` : ''}
      › ${esc(h.lotName)}
    </div>
    <div class="page-title">
      ${esc(h.lotName)}
      <div class="actions">
        <button class="btn btn-ghost btn-sm" onclick="openModal('home',${h.id})">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteHome(${h.id})">Delete</button>
      </div>
    </div>

    <div class="detail-section">
      <h3>Location &amp; Status</h3>
      <div class="info-grid">
        <div class="info-item"><label>Neighborhood</label><div class="val">${esc(h.neighborhood||'—')}</div></div>
        <div class="info-item"><label>Status</label><div class="val">${renovBadge(h.renovationStatus)}</div></div>
        <div class="info-item"><label>Design Order</label><div class="val">${h.designOrder!=null?'#'+h.designOrder:'—'}</div></div>
        <div class="info-item"><label>Fairy's Visit</label><div class="val">${h.storyOrder!=null?'Visit #'+h.storyOrder:'Not yet visited'}</div></div>
        <div class="info-item"><label>Household</label><div class="val">${hh?`<span class="wiki-link" data-nav="household" data-id="${hh.id}">${esc(hh.name)}</span>`:'Unoccupied'}</div></div>
        ${members?`<div class="info-item"><label>Residents</label><div class="val">${members}</div></div>`:''}
      </div>
    </div>

    ${h.styleNotes?`<div class="detail-section"><h3>Design &amp; Style Notes</h3><div class="long-text">${esc(h.styleNotes)}</div></div>`:''}
    ${h.fairyVisitNotes&&h.storyOrder!=null?`<div class="detail-section"><h3>The Fairy's Notes</h3><div class="long-text">${esc(h.fairyVisitNotes)}</div></div>`:''}`;
}

function vChronicle() {
  const f = fairy();
  const visited = D.homes.filter(h => h.storyOrder!=null).sort((a,b)=>a.storyOrder-b.storyOrder);

  const entries = visited.length === 0
    ? `<p class="empty">No visits yet. Set a Story Order on any Home to begin the Chronicle.</p>`
    : visited.map(h => {
        const hh = h.householdId ? byId(D.households, h.householdId) : null;
        return `<div class="chronicle-entry">
          <div class="chronicle-num">Visit #${h.storyOrder} · ${esc(h.neighborhood||'')}</div>
          <div class="chronicle-home wiki-link" data-nav="home-detail" data-id="${h.id}">${esc(h.lotName)}</div>
          ${hh?`<div style="font-size:0.875rem;color:var(--muted);margin-bottom:0.25rem"><span class="wiki-link" data-nav="household" data-id="${hh.id}">${esc(hh.name)}</span></div>`:''}
          ${h.fairyVisitNotes?`<div class="chronicle-notes">${esc(h.fairyVisitNotes)}</div>`:''}
        </div>`;
      }).join('');

  return `
    <div class="page-title">
      ✦ The Fairy's Chronicle
      ${f?`<span style="font-size:0.9rem;font-weight:normal;color:var(--muted);font-family:sans-serif"><span class="wiki-link" data-nav="character" data-id="${f.id}">${esc(f.name)}</span></span>`:''}
    </div>
    ${entries}`;
}

// ── Modals ────────────────────────────────────────────────────────────────────

let mType=null, mId=null, pendingRels=[];

const OCCULTS  = ['Human','Spellcaster','Vampire','Mermaid','Werewolf','Alien','Servo','Ghost','Other'];
const STATUSES = ['original','in-progress','renovated','rebuilt'];

function openModal(type, id) {
  mType = type; mId = id;
  const title = document.getElementById('modal-title');
  const body  = document.getElementById('modal-body');
  const saveBtn = document.getElementById('modal-save-btn');

  if (type === 'character') {
    const c = id ? byId(D.characters, id) : null;
    pendingRels = c ? JSON.parse(JSON.stringify(c.relationships||[])) : [];
    title.textContent = id ? 'Edit Character' : 'New Character';
    saveBtn.onclick = saveChar;
    const others = D.characters.filter(x => x.id !== id);

    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label>Name *</label><input id="c-name" value="${esc(c?.name||'')}"/></div>
        <div class="form-group"><label>Occult Type</label>
          <select id="c-occult">${OCCULTS.map(o=>`<option ${(c?.occultType||'Human')===o?'selected':''}>${o}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Career</label><input id="c-career" value="${esc(c?.career||'')}"/></div>
        <div class="form-group"><label>Aspiration</label><input id="c-aspiration" value="${esc(c?.aspiration||'')}"/></div>
      </div>
      <div class="form-group"><label>Traits (one per line)</label><textarea id="c-traits" rows="3">${esc((c?.traits||[]).join('\n'))}</textarea></div>
      <div class="form-group"><label>Their Story / Backstory</label><textarea id="c-backstory" rows="5">${esc(c?.backstory||'')}</textarea></div>
      <div class="fairy-check-wrap">
        <input type="checkbox" id="c-fairy" ${c?.isTheFairy?'checked':''}>
        <label for="c-fairy">✦ This character is The Fairy</label>
      </div>
      <div class="form-group">
        <label>Relationships</label>
        <div class="rel-builder">
          <div class="rel-builder-list" id="rel-list"></div>
          <div class="rel-add-form">
            ${others.length > 0 ? `
              <div class="rel-add-row">
                <select id="rel-who">${others.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('')}</select>
                <input id="rel-label" placeholder="Label (e.g. Spouse, Rival)" style="flex:1"/>
              </div>
              <div class="rel-add-row">
                <input id="rel-notes" placeholder="Notes (optional)" style="flex:1"/>
                <button class="btn btn-primary btn-sm" onclick="addRel()" style="flex-shrink:0">Add</button>
              </div>` : `<div style="padding:0.4rem;font-size:0.8125rem;color:var(--muted)">Add other characters first.</div>`}
          </div>
        </div>
      </div>`;
    renderRelList(others);

  } else if (type === 'household') {
    const hh = id ? byId(D.households, id) : null;
    title.textContent = id ? 'Edit Household' : 'New Household';
    saveBtn.onclick = saveHH;

    body.innerHTML = `
      <div class="form-group"><label>Household Name *</label><input id="hh-name" value="${esc(hh?.name||'')}"/></div>
      <div class="form-group"><label>Description</label><textarea id="hh-desc" rows="4">${esc(hh?.description||'')}</textarea></div>
      <div class="form-group"><label>Home / Lot</label>
        <select id="hh-home">
          <option value="">— None —</option>
          ${D.homes.map(h=>`<option value="${h.id}" ${hh?.homeId===h.id?'selected':''}>${esc(h.lotName)}${h.neighborhood?' — '+esc(h.neighborhood):''}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label>Members</label>
        ${D.characters.length > 0
          ? `<div class="checkbox-group">${D.characters.map(c=>`<label><input type="checkbox" value="${c.id}" ${(hh?.memberIds||[]).includes(c.id)?'checked':''}>${esc(c.name)} <span style="color:var(--muted)">${esc(c.occultType||'Human')}</span></label>`).join('')}</div>`
          : `<p style="color:var(--muted);font-size:0.875rem">No characters yet.</p>`}
      </div>`;

  } else if (type === 'home') {
    const h = id ? byId(D.homes, id) : null;
    title.textContent = id ? 'Edit Home / Lot' : 'New Home / Lot';
    saveBtn.onclick = saveHome;

    body.innerHTML = `
      <div class="form-row">
        <div class="form-group"><label>Lot Name *</label><input id="h-name" value="${esc(h?.lotName||'')}"/></div>
        <div class="form-group"><label>Neighborhood</label><input id="h-nbhood" value="${esc(h?.neighborhood||'')}"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Renovation Status</label>
          <select id="h-status">${STATUSES.map(s=>`<option value="${s}" ${(h?.renovationStatus||'original')===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1).replace('-',' ')}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label>Household</label>
          <select id="h-hh">
            <option value="">— Unoccupied —</option>
            ${D.households.map(hh=>`<option value="${hh.id}" ${h?.householdId===hh.id?'selected':''}>${esc(hh.name)}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Design Order #</label><input id="h-dorder" type="number" min="1" value="${h?.designOrder??''}" placeholder="Your build sequence"/></div>
        <div class="form-group"><label>Story Order # (Fairy's Visit)</label><input id="h-sorder" type="number" min="1" value="${h?.storyOrder??''}" placeholder="Leave blank if not visited"/></div>
      </div>
      <div class="form-group"><label>Design &amp; Style Notes</label><textarea id="h-style" rows="3">${esc(h?.styleNotes||'')}</textarea></div>
      <div class="form-group"><label>The Fairy's Visit Notes</label><textarea id="h-fairy" rows="3">${esc(h?.fairyVisitNotes||'')}</textarea></div>`;
  }

  document.getElementById('modal-backdrop').classList.add('open');
}

function renderRelList(others) {
  const list = document.getElementById('rel-list');
  if (!list) return;
  if (!pendingRels.length) {
    list.innerHTML = `<div style="padding:0.4rem;font-size:0.8125rem;color:var(--muted);font-style:italic">No relationships yet.</div>`;
    return;
  }
  list.innerHTML = pendingRels.map((r,i) => `
    <div class="rbi">
      <span class="rbi-name">${esc(charName(r.charId))}</span>
      ${r.label?`<span class="rbi-label">${esc(r.label)}</span>`:''}
      ${r.notes?`<span class="rbi-label">${esc(r.notes)}</span>`:''}
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="removeRel(${i})">✕</button>
    </div>`).join('');
}

function addRel() {
  const who   = document.getElementById('rel-who');
  const label = document.getElementById('rel-label');
  const notes = document.getElementById('rel-notes');
  if (!who?.value) return;
  pendingRels.push({ charId: parseInt(who.value), label: label?.value.trim()||'', notes: notes?.value.trim()||'' });
  if (label) label.value = '';
  if (notes) notes.value = '';
  renderRelList(D.characters.filter(x => x.id !== mId));
}

function removeRel(i) {
  pendingRels.splice(i, 1);
  renderRelList(D.characters.filter(x => x.id !== mId));
}

function saveChar() {
  const name = document.getElementById('c-name')?.value.trim();
  if (!name) { alert('Name is required.'); return; }

  const traits    = (document.getElementById('c-traits')?.value||'').split('\n').map(t=>t.trim()).filter(Boolean);
  const isFairy   = document.getElementById('c-fairy')?.checked;

  if (isFairy) D.characters.forEach(c => { if (c.id !== mId) c.isTheFairy = false; });

  const data = {
    name,
    occultType:    document.getElementById('c-occult')?.value || 'Human',
    career:        document.getElementById('c-career')?.value.trim() || '',
    aspiration:    document.getElementById('c-aspiration')?.value.trim() || '',
    traits,
    backstory:     document.getElementById('c-backstory')?.value.trim() || '',
    isTheFairy:    isFairy || false,
    relationships: pendingRels,
  };

  if (mId) {
    Object.assign(byId(D.characters, mId), data);
  } else {
    D.characters.push({ id: D.nextCharId++, householdId: null, ...data });
  }

  save(); closeModal();
  navigate('character', mId || D.characters[D.characters.length-1].id);
}

function saveHH() {
  const name = document.getElementById('hh-name')?.value.trim();
  if (!name) { alert('Household name is required.'); return; }

  const memberIds = [...document.querySelectorAll('#modal-body .checkbox-group input:checked')].map(el=>parseInt(el.value));
  const homeId    = parseInt(document.getElementById('hh-home')?.value)||null;

  if (mId) {
    const hh = byId(D.households, mId);
    hh.name = name; hh.description = document.getElementById('hh-desc')?.value.trim()||'';
    hh.memberIds = memberIds; hh.homeId = homeId;
  } else {
    D.households.push({ id: D.nextHouseholdId++, name, description: document.getElementById('hh-desc')?.value.trim()||'', memberIds, homeId });
  }

  // Keep character.householdId in sync
  D.characters.forEach(c => {
    const found = D.households.find(hh => (hh.memberIds||[]).includes(c.id));
    c.householdId = found ? found.id : null;
  });

  save(); closeModal();
  navigate('household', mId || D.households[D.households.length-1].id);
}

function saveHome() {
  const name = document.getElementById('h-name')?.value.trim();
  if (!name) { alert('Lot name is required.'); return; }

  const dOrder      = parseInt(document.getElementById('h-dorder')?.value)||null;
  const sOrder      = parseInt(document.getElementById('h-sorder')?.value)||null;
  const householdId = parseInt(document.getElementById('h-hh')?.value)||null;

  const data = {
    lotName:          name,
    neighborhood:     document.getElementById('h-nbhood')?.value.trim()||'',
    renovationStatus: document.getElementById('h-status')?.value||'original',
    householdId,
    designOrder:      dOrder,
    storyOrder:       sOrder,
    styleNotes:       document.getElementById('h-style')?.value.trim()||'',
    fairyVisitNotes:  document.getElementById('h-fairy')?.value.trim()||'',
  };

  if (mId) {
    Object.assign(byId(D.homes, mId), data);
  } else {
    D.homes.push({ id: D.nextHomeId++, ...data });
  }

  save(); closeModal();
  navigate('home-detail', mId || D.homes[D.homes.length-1].id);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  mType = mId = null; pendingRels = [];
}

// ── Delete ────────────────────────────────────────────────────────────────────

function deleteChar(id) {
  const c = byId(D.characters, id);
  if (!c || !confirm(`Delete ${c.name}? This cannot be undone.`)) return;
  D.characters = D.characters.filter(x => x.id !== id);
  D.households.forEach(hh => { hh.memberIds = (hh.memberIds||[]).filter(m => m !== id); });
  D.characters.forEach(c  => { c.relationships = (c.relationships||[]).filter(r => r.charId !== id); });
  save(); navigate('all-characters');
}

function deleteHH(id) {
  const hh = byId(D.households, id);
  if (!hh || !confirm(`Delete household "${hh.name}"?`)) return;
  D.households = D.households.filter(x => x.id !== id);
  D.characters.forEach(c => { if (c.householdId === id) c.householdId = null; });
  save(); navigate('all-households');
}

function deleteHome(id) {
  const h = byId(D.homes, id);
  if (!h || !confirm(`Delete "${h.lotName}"?`)) return;
  D.homes = D.homes.filter(x => x.id !== id);
  D.households.forEach(hh => { if (hh.homeId === id) hh.homeId = null; });
  save(); navigate('all-homes');
}

// ── Navigation ────────────────────────────────────────────────────────────────

document.addEventListener('click', e => {
  const el = e.target.closest('[data-nav]');
  if (!el || el.closest('.modal')) return;

  const view   = el.dataset.nav;
  const rawId  = el.dataset.id;
  const filter = el.dataset.filter;   // string or '' or undefined

  // Numeric ID (characters, households, homes)
  if (rawId) {
    navigate(view, parseInt(rawId));
    return;
  }

  // Neighborhood filter for all-homes (data-filter present, even if empty string)
  if (view === 'all-homes' && filter !== undefined) {
    curView = 'all-homes';
    curId   = filter || null;   // empty string → null = show all
    renderMain();
    window.scrollTo(0, 0);
    return;
  }

  navigate(view);
});

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ── Init ──────────────────────────────────────────────────────────────────────

renderMain();
</script>
</body>
</html>
