name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: PlannerApp/package-lock.json

      - name: Install PlannerApp dependencies
        run: npm ci
        working-directory: PlannerApp

      - name: Build PlannerApp
        run: npm run build
        working-directory: PlannerApp

      - name: Assemble site
        run: |
          mkdir _site
          rsync -a \
            --exclude='.git' \
            --exclude='PlannerApp' \
            --exclude='_site' \
            --exclude='*.md' \
            . _site/
          mkdir -p _site/planner
          cp -r PlannerApp/dist/. _site/planner/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
